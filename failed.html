<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaction Failed | J Traders</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: var(--primary-black);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
        }
        .failed-card {
            background: var(--glass-bg);
            border: 1px solid rgba(250, 82, 82, 0.3);
            padding: 4rem;
            border-radius: 12px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(20px);
        }
        .error-icon {
            font-size: 5rem;
            color: #fa5252;
            margin-bottom: 2rem;
        }
        h1 { color: white; margin-bottom: 1rem; }
        p { color: var(--text-silver); margin-bottom: 2rem; }
        .retry-btn {
            background: #fa5252;
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 4px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .retry-btn:hover { background: #e03131; }
        .back-link { display: block; margin-top: 1.5rem; color: var(--accent-gold); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="failed-card">
        <div class="error-icon"><i class="fas fa-times-circle"></i></div>
        <h1>Security Verification Failed</h1>
        <p>We were unable to authorize your transaction. This might be due to incorrect details or a connection timeout with your bank.</p>
        <button class="retry-btn" onclick="window.history.back()">Retry Security Check</button>
        <a href="index.html" class="back-link">Return to Homepage</a>
    </div>
</body>
</html>
